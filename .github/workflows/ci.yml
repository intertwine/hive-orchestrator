name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  driver-conformance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run driver and console conformance fixtures
        run: uv run pytest tests/test_hive_drivers.py tests/test_console_api.py tests/test_event_schema.py -q

  console-frontend-smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/console

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/console/pnpm-lock.yaml

      - name: Activate pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install console dependencies
        run: pnpm install --frozen-lockfile

      - name: Run console browser-smoke tests
        run: pnpm test

  packaging-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Validate release artifacts and install paths
        run: make release-check
