name: Hive Projection Sync

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI

# Minimal permissions following principle of least privilege
permissions:
  contents: write  # Required to commit state updates

jobs:
  projection-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv sync

      - name: Run Hive Projection Sync
        run: |
          uv run hive cache rebuild --json
          uv run hive sync projections --json

      - name: Validate changes before commit
        run: |
          # Only add generated projection files for safety
          mapfile -t agency_files < <(find projects -name AGENCY.md -print 2>/dev/null)
          git add AGENTS.md GLOBAL.md "${agency_files[@]}" 2>/dev/null || true

          # Check which files are staged
          if git diff --staged --name-only | grep -qvE '^(AGENTS\.md|GLOBAL\.md|projects/.*/AGENCY\.md)$'; then
            echo "⚠️ WARNING: Unexpected files modified. Only generated projection files should be changed."
            echo "Modified files:"
            git diff --staged --name-only
            echo "Aborting commit for safety."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "Agent Hive Projection Sync"
          git config user.email "projection-sync@agent-hive.dev"

      - name: Commit and push changes
        run: |
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            echo "Committing validated Hive projection updates..."
            git commit -m "🧠 Hive projection sync [$(date -u +%Y-%m-%d\ %H:%M\ UTC)]"
            git push
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: projection-sync-logs-${{ github.run_number }}
          path: |
            *.log
            **/*.log
          retention-days: 7
