name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release tag to publish or re-verify (for example: v2.2.1)"
        required: true
        type: string
      skip_existing:
        description: "Allow rerunning trusted publishing when the version is already on PyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  RELEASE_PYTHON_VERSION: "3.11"
  DIST_PACKAGE_NAME: "mellona-hive"
  HOMEBREW_FORMULA_NAME: "mellona-hive"
  HOMEBREW_PYTHON_VERSION: "3.13"
  HOMEBREW_PYTHON_DEP: "python@3.13"

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi

    outputs:
      version: ${{ steps.pkg_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_ref) || github.ref }}

      - name: Require a version tag ref
        run: |
          RELEASE_REF="${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}"
          if [[ "$RELEASE_REF" == v* ]]; then
            RELEASE_REF="refs/tags/$RELEASE_REF"
          fi
          if [[ "$RELEASE_REF" != refs/tags/v* ]]; then
            echo "This workflow only publishes from version tags like v2.2.1."
            echo "Push a version tag first, or pass an existing tag through workflow_dispatch."
            exit 1
          fi
          echo "RELEASE_REF=$RELEASE_REF" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Build releases on the oldest supported interpreter so packaging regressions
          # show up before publish instead of hiding behind a newer runtime.
          python-version: ${{ env.RELEASE_PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install build dependencies
        run: uv sync --extra dev

      - name: Read package version
        id: pkg_version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag matches pyproject version
        run: |
          TAG_REF="${RELEASE_REF:-${GITHUB_REF}}"
          if [[ "$TAG_REF" == v* ]]; then
            TAG_REF="refs/tags/$TAG_REF"
          fi
          TAG_VERSION="${TAG_REF#refs/tags/v}"
          PKG_VERSION="${{ steps.pkg_version.outputs.version }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject version ($PKG_VERSION)"
            exit 1
          fi

      - name: Run release smoke checks
        run: make release-check

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_existing || false }}

  verify-homebrew:
    runs-on: macos-latest
    needs: publish-pypi

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.HOMEBREW_PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install build dependencies
        run: uv sync --extra dev

      - name: Wait for PyPI artifacts to propagate
        env:
          PACKAGE_VERSION: ${{ needs.publish-pypi.outputs.version }}
        run: |
          for attempt in {1..20}; do
            if curl -fsSL "https://pypi.org/pypi/${{ env.DIST_PACKAGE_NAME }}/${PACKAGE_VERSION}/json" >/dev/null 2>&1; then
              echo "PyPI release is live."
              exit 0
            fi
            echo "Waiting for PyPI propagation (${attempt}/20)..."
            sleep 15
          done
          echo "Timed out waiting for ${{ env.DIST_PACKAGE_NAME }} ${PACKAGE_VERSION} on PyPI."
          exit 1

      - name: Generate Homebrew formula
        run: |
          uv run --with pip python scripts/generate_homebrew_formula.py \
            --formula-name "${{ env.HOMEBREW_FORMULA_NAME }}" \
            --package-name "${{ env.DIST_PACKAGE_NAME }}" \
            --package-version "${{ needs.publish-pypi.outputs.version }}" \
            --python-dep "${{ env.HOMEBREW_PYTHON_DEP }}" \
            --python-version "${{ env.HOMEBREW_PYTHON_VERSION }}" \
            --output packaging/homebrew/${{ env.HOMEBREW_FORMULA_NAME }}.rb

      - name: Verify Homebrew formula
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: make brew-release-check

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [publish-pypi, verify-homebrew]

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # The formula generator resolves resources against the Homebrew-managed Python
          # runtime that the tap will depend on, which is intentionally separate from the
          # minimum supported interpreter we test in CI.
          python-version: ${{ env.HOMEBREW_PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Warn if formula name already exists in Homebrew/core
        run: |
          FORMULA_NAME="${{ env.HOMEBREW_FORMULA_NAME }}"
          if curl -fsSL "https://formulae.brew.sh/api/formula/${FORMULA_NAME}.json" >/dev/null 2>&1; then
            echo "::warning::Formula name '${FORMULA_NAME}' already exists in Homebrew/core. Use a fully qualified tap install target and consider renaming before a public tap release."
          fi

      - name: Validate Homebrew tap configuration
        env:
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_REPO" ]; then
            echo "Missing repository variable HOMEBREW_TAP_REPO (example: intertwine/homebrew-tap)"
            exit 1
          fi
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "Missing secret HOMEBREW_TAP_GITHUB_TOKEN with push access to $HOMEBREW_TAP_REPO"
            exit 1
          fi

      - name: Wait for PyPI artifacts to propagate
        env:
          PACKAGE_VERSION: ${{ needs.publish-pypi.outputs.version }}
        run: |
          for attempt in {1..20}; do
            if curl -fsSL "https://pypi.org/pypi/${{ env.DIST_PACKAGE_NAME }}/${PACKAGE_VERSION}/json" >/dev/null 2>&1; then
              echo "PyPI release is live."
              exit 0
            fi
            echo "Waiting for PyPI propagation (${attempt}/20)..."
            sleep 15
          done
          echo "Timed out waiting for ${{ env.DIST_PACKAGE_NAME }} ${PACKAGE_VERSION} on PyPI."
          exit 1

      - name: Generate Homebrew formula
        run: |
          uv run --with pip python scripts/generate_homebrew_formula.py \
            --formula-name "${{ env.HOMEBREW_FORMULA_NAME }}" \
            --package-name "${{ env.DIST_PACKAGE_NAME }}" \
            --package-version "${{ needs.publish-pypi.outputs.version }}" \
            --python-dep "${{ env.HOMEBREW_PYTHON_DEP }}" \
            --python-version "${{ env.HOMEBREW_PYTHON_VERSION }}" \
            --output packaging/homebrew/${{ env.HOMEBREW_FORMULA_NAME }}.rb

      - name: Checkout tap repository
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula in tap repository
        run: |
          mkdir -p homebrew-tap/Formula
          cp packaging/homebrew/${{ env.HOMEBREW_FORMULA_NAME }}.rb homebrew-tap/Formula/${{ env.HOMEBREW_FORMULA_NAME }}.rb

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          if [ -z "$(git status --porcelain -- Formula/${{ env.HOMEBREW_FORMULA_NAME }}.rb)" ]; then
            echo "No formula changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/${{ env.HOMEBREW_FORMULA_NAME }}.rb
          git commit -m "${{ env.HOMEBREW_FORMULA_NAME }} ${{ needs.publish-pypi.outputs.version }}"
          git push
