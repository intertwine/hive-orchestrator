name: Ready Work Snapshot

on:
  schedule:
    # Run shortly after the projection-sync workflow so fresh ready-work
    # snapshots are available as artifacts.
    - cron: '15 */4 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI

# Minimal permissions following principle of least privilege
permissions:
  contents: read

jobs:
  ready-work:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv sync

      - name: Generate Ready Work Snapshot
        run: |
          uv run hive task ready --json > ready-work.json
          uv run hive doctor --json > hive-doctor.json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ready-work-${{ github.run_number }}
          path: |
            ready-work.json
            hive-doctor.json
          retention-days: 7
