name: Claude Code

on:
  # Review pull requests when they are opened, updated, reopened, or marked ready
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Respond to @claude mentions in issue comments
  issue_comment:
    types: [created]
  # Respond to @claude mentions in PR review comments
  pull_request_review_comment:
    types: [created]
  # Respond to @claude mentions in PR reviews
  pull_request_review:
    types: [submitted]
  # Respond to @claude mentions when issues are opened or assigned
  issues:
    types: [opened, assigned]

jobs:
  claude-response:
    # Only run interactive mention and assignment flows on non-PR-lifecycle events.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@Claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@Claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@Claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.body, '@Claude') || (github.event.action == 'assigned' && github.event.assignee.login == 'claude')))

    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write       # Required to push code changes
      pull-requests: write  # Required to create/update PRs and comment
      issues: write         # Required to comment on issues
      id-token: write       # Required for OIDC token (if using cloud providers)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Copy event payload for Claude normalization
        run: cp "${GITHUB_EVENT_PATH}" "${RUNNER_TEMP}/claude-event.json"

      - name: Normalize Claude trigger casing
        run: python .github/scripts/normalize_claude_trigger.py "${RUNNER_TEMP}/claude-event.json"

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        env:
          GITHUB_EVENT_PATH: ${{ runner.temp }}/claude-event.json
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            EVENT NAME: ${{ github.event_name }}

            Respond to the GitHub mention or assignment request directly on GitHub.
            Keep GitHub comments concise and actionable.
            Never paste raw shell output, test logs, or long diffs into a GitHub comment.
            Summarize command results in prose and point to the workflow or job URL for full logs.
            Quote only the minimum relevant evidence needed to support a conclusion.
            Only publish the final GitHub comment or PR update, not raw action output.
          # Allowed tools for this repository
          claude_args: |
            --allowedTools "Bash(*),Read,Write,Edit,Glob,Grep,TodoWrite"

  claude-review:
    # Review both draft and ready PRs so long-running implementation branches get early signal.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude PR review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request with a focus on:
            - Bugs and behavioral regressions
            - Missing tests or validation gaps
            - Security or safety risks
            - Mismatches between implementation and stated intent

            Keep GitHub comments concise and actionable.
            Never paste raw shell output, test logs, or long diffs into a GitHub comment.
            Summarize command results in prose and point to the workflow or job URL for full logs.
            Quote only the minimum relevant evidence needed to support a conclusion.
            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true` for code-specific findings.
            Only post GitHub comments. Do not submit review text as plain action messages.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
