name: Ready Work Snapshot

on:
  schedule:
    # Run 15 minutes after Cortex (which runs at 0 */4 * * *)
    # This ensures state is updated before we dispatch
    - cron: '15 */4 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI
    inputs:
      dry_run:
        description: 'Dry run (preview only, no changes)'
        required: false
        default: false
        type: boolean
      max_dispatches:
        description: 'Maximum projects to dispatch (1-10)'
        required: false
        default: '1'
        type: string

# Minimal permissions following principle of least privilege
permissions:
  contents: read

jobs:
  ready-work:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          # Download and verify uv installer
          curl -LsSf https://astral.sh/uv/install.sh -o install.sh
          # Install uv
          sh install.sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rm install.sh

      - name: Install dependencies
        run: |
          uv sync

      - name: Generate Ready Work Snapshot
        run: |
          uv run hive task ready --json > ready-work.json
          uv run hive doctor --json > hive-doctor.json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ready-work-${{ github.run_number }}
          path: |
            ready-work.json
            hive-doctor.json
          retention-days: 7
