name: Ready Work Snapshot

on:
  schedule:
    # Run shortly after the projection-sync workflow so fresh ready-work
    # snapshots are available as artifacts.
    - cron: '15 */4 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI

# Minimal permissions following principle of least privilege
permissions:
  contents: read

jobs:
  ready-work:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7

      - name: Install dependencies
        run: |
          uv sync

      - name: Generate Ready Work Snapshot
        run: |
          uv run hive task ready --json > ready-work.json
          uv run hive doctor --json > hive-doctor.json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ready-work-${{ github.run_number }}
          path: |
            ready-work.json
            hive-doctor.json
          retention-days: 7
