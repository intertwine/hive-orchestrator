name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  RELEASE_PYTHON_VERSION: "3.11"
  HOMEBREW_PYTHON_VERSION: "3.13"
  HOMEBREW_PYTHON_DEP: "python@3.13"

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment:
      name: pypi

    outputs:
      version: ${{ steps.pkg_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Require a version tag ref
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "This workflow only publishes from version tags like v0.1.0."
            echo "Create and push a release tag, then run the workflow from that tag if you need a manual retry."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Build releases on the oldest supported interpreter so packaging regressions
          # show up before publish instead of hiding behind a newer runtime.
          python-version: ${{ env.RELEASE_PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install build dependencies
        run: uv sync --extra dev

      - name: Read package version
        id: pkg_version
        run: |
          VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.pkg_version.outputs.version }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject version ($PKG_VERSION)"
            exit 1
          fi

      - name: Run release smoke checks
        run: make release-check

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-homebrew:
    runs-on: macos-latest
    needs: publish-pypi

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.HOMEBREW_PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install build dependencies
        run: uv sync --extra dev

      - name: Wait for PyPI artifacts to propagate
        env:
          PACKAGE_VERSION: ${{ needs.publish-pypi.outputs.version }}
        run: |
          for attempt in {1..20}; do
            if curl -fsSL "https://pypi.org/pypi/agent-hive/${PACKAGE_VERSION}/json" >/dev/null 2>&1; then
              echo "PyPI release is live."
              exit 0
            fi
            echo "Waiting for PyPI propagation (${attempt}/20)..."
            sleep 15
          done
          echo "Timed out waiting for agent-hive ${PACKAGE_VERSION} on PyPI."
          exit 1

      - name: Generate Homebrew formula
        run: |
          uv run --with pip python scripts/generate_homebrew_formula.py \
            --package-version "${{ needs.publish-pypi.outputs.version }}" \
            --python-dep "${{ env.HOMEBREW_PYTHON_DEP }}" \
            --python-version "${{ env.HOMEBREW_PYTHON_VERSION }}" \
            --output packaging/homebrew/agent-hive.rb

      - name: Verify Homebrew formula
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: make brew-release-check

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [publish-pypi, verify-homebrew]

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # The formula generator resolves resources against the Homebrew-managed Python
          # runtime that the tap will depend on, which is intentionally separate from the
          # minimum supported interpreter we test in CI.
          python-version: ${{ env.HOMEBREW_PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Warn if formula name already exists in Homebrew/core
        run: |
          FORMULA_NAME="agent-hive"
          if curl -fsSL "https://formulae.brew.sh/api/formula/${FORMULA_NAME}.json" >/dev/null 2>&1; then
            echo "::warning::Formula name '${FORMULA_NAME}' already exists in Homebrew/core. Use a fully qualified tap install target and consider renaming before a public tap release."
          fi

      - name: Validate Homebrew tap configuration
        env:
          HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_REPO" ]; then
            echo "Missing repository variable HOMEBREW_TAP_REPO (example: intertwine/homebrew-tap)"
            exit 1
          fi
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "Missing secret HOMEBREW_TAP_GITHUB_TOKEN with push access to $HOMEBREW_TAP_REPO"
            exit 1
          fi

      - name: Wait for PyPI artifacts to propagate
        env:
          PACKAGE_VERSION: ${{ needs.publish-pypi.outputs.version }}
        run: |
          for attempt in {1..20}; do
            if curl -fsSL "https://pypi.org/pypi/agent-hive/${PACKAGE_VERSION}/json" >/dev/null 2>&1; then
              echo "PyPI release is live."
              exit 0
            fi
            echo "Waiting for PyPI propagation (${attempt}/20)..."
            sleep 15
          done
          echo "Timed out waiting for agent-hive ${PACKAGE_VERSION} on PyPI."
          exit 1

      - name: Generate Homebrew formula
        run: |
          uv run --with pip python scripts/generate_homebrew_formula.py \
            --package-version "${{ needs.publish-pypi.outputs.version }}" \
            --python-dep "${{ env.HOMEBREW_PYTHON_DEP }}" \
            --python-version "${{ env.HOMEBREW_PYTHON_VERSION }}" \
            --output packaging/homebrew/agent-hive.rb

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula in tap repository
        run: |
          mkdir -p homebrew-tap/Formula
          cp packaging/homebrew/agent-hive.rb homebrew-tap/Formula/agent-hive.rb

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          if git diff --quiet -- Formula/agent-hive.rb; then
            echo "No formula changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-hive.rb
          git commit -m "agent-hive ${{ needs.publish-pypi.outputs.version }}"
          git push
